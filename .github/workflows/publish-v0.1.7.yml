name: Publish SVNManager v0.1.7

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/publish-v0.1.7.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Build release zip
        shell: pwsh
        run: |
          .\Publish-Release.ps1 -Configuration Release -Runtime win-x64

      - name: Publish GitHub Release asset
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: v0.1.7
          RELEASE_TITLE: SVNManager v0.1.7
        run: |
          $notesPath = Resolve-Path ".\.github\release-notes\v0.1.7.md"
          $zip = Resolve-Path ".\artifacts\DreamSVNManager-win-x64-v0.1.7.zip"
          gh release view $env:TAG --repo $env:GITHUB_REPOSITORY *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $env:TAG $zip --repo $env:GITHUB_REPOSITORY --title $env:RELEASE_TITLE --notes-file $notesPath
          } else {
            gh release edit $env:TAG --repo $env:GITHUB_REPOSITORY --title $env:RELEASE_TITLE --notes-file $notesPath
            gh release upload $env:TAG $zip --repo $env:GITHUB_REPOSITORY --clobber
          }
